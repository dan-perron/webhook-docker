---
version: "3.8"
services:
  webhook-server:
    build:
      context: ./webhook-server
      #tags:
      #  - "dan-perron/webhook-server"
    container_name: webhook-server
    image: "dan-perron/webhook-server"
    environment:
      - MONGODB_CONNSTRING=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb/?authSource=admin
    ports:
      - 3000:3000
    restart: unless-stopped
    volumes:
      - thunderdome-ootp:/ootp
  calcium-tracker:
    build:
      context: ./calcium-tracker
    container_name: calcium-tracker
    image: "dan-perron/calcium-tracker"
    environment:
      - MONGODB_CONNSTRING=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb/?authSource=admin
      - BASE_PATH=${CALCIUM_BASE_PATH:-/calcium}
      - CALCIUM_PASSWORD=${CALCIUM_PASSWORD:-}
      - CALCIUM_COOKIE_SECRET=${CALCIUM_COOKIE_SECRET:-change-me}
    ports:
      - 3001:3001
    restart: unless-stopped
  mongodb:
    image: mongo:6.0
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    restart: unless-stopped
volumes:
  mongodb-data:
  thunderdome-ootp:
    external:
      name: thunderdome-ootp
